<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Preisliste – MarlinW Media</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background" aria-hidden="true">
    <div class="grid"></div>
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>
    <div class="shape four"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <header class="site-header">
    <div class="header-inner booking-header-inner">
      <a href="booking.html" class="brand brand-left" aria-label="Zurück zur Buchungsseite">
        <img src="logo-white.png" alt="MarlinW Media Logo" class="brand-logo" id="brandLogo" />
      </a>

      <nav class="desktop-nav" aria-label="Hauptnavigation">
        <a href="booking.html">Zurück</a>
        <a href="index.html#portfolio">Portfolio</a>
        <a href="index.html#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <main class="price-page">
    <section class="price-image-wrap">
      <div class="price-image-card">
        <svg class="price-image-svg" viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Preisliste MarlinW Media">
          <defs>
            <linearGradient id="bgCard" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#111111"/>
              <stop offset="100%" stop-color="#1f1f1f"/>
            </linearGradient>
            <pattern id="gridPattern" width="24" height="24" patternUnits="userSpaceOnUse">
              <path d="M24 0H0V24" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
            </pattern>
          </defs>

          <rect x="40" y="40" width="1120" height="1520" rx="42" fill="url(#bgCard)"/>
          <rect x="40" y="40" width="1120" height="1520" rx="42" fill="url(#gridPattern)"/>
          <rect x="80" y="80" width="1040" height="1440" rx="30" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>

          <text x="120" y="170" fill="#ffffff" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="700">Preisliste</text>
          <text x="120" y="225" fill="#cfcfcf" font-size="28" font-family="Arial, Helvetica, sans-serif">MarlinW Media • Richtwerte pro Stunde / Projektbasis</text>

          <circle cx="1020" cy="155" r="18" fill="#ff3b30"/>
          <text x="120" y="300" fill="#ffffff" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Hinweis</text>
          <text x="120" y="345" fill="#cfcfcf" font-size="26" font-family="Arial, Helvetica, sans-serif">
            <tspan x="120" dy="0">Die finalen Preise hängen vom Arbeitsumfang, der Planung, der Bearbeitung,</tspan>
            <tspan x="120" dy="38">dem Equipment und den Nutzungsrechten ab.</tspan>
          </text>

          <text x="120" y="455" fill="#ffffff" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Stundenlohn Richtwert</text>
          <rect x="120" y="490" width="960" height="120" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
          <text x="160" y="565" fill="#ffffff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">ca. 70 € / Stunde</text>

          <text x="120" y="710" fill="#ffffff" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Typische Projektbereiche</text>

          <g fill="#cfcfcf" font-size="26" font-family="Arial, Helvetica, sans-serif">
            <text x="140" y="780">• Fotografie: ab ca. 250 € – 400 €</text>
            <text x="140" y="830">• Videografie: ab ca. 400 € – 700 €</text>
            <text x="140" y="880">• Musikvideo / größere Produktionen: ab ca. 450 €</text>
            <text x="140" y="930">• Hochzeiten: ab ca. 1900 €</text>
            <text x="140" y="980">• Grafikdesign: ab ca. 150 € – 500 €</text>
            <text x="140" y="1030">• Website erstellen: ab ca. 800 €</text>
            <text x="140" y="1080">• Online Shop: ab ca. 1200 €</text>
          </g>

          <text x="120" y="1200" fill="#ffffff" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Wichtig</text>
          <text x="120" y="1245" fill="#cfcfcf" font-size="26" font-family="Arial, Helvetica, sans-serif">
            <tspan x="120" dy="0">Diese Werte sind zur Orientierung gedacht und basieren auf vergangenen Projekten.</tspan>
            <tspan x="120" dy="38">Das finale Angebot wird immer passend zum konkreten Projekt erstellt.</tspan>
          </text>

          <text x="120" y="1420" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif">marlinw.media@gmail.com</text>
          <text x="120" y="1465" fill="#cfcfcf" font-size="22" font-family="Arial, Helvetica, sans-serif">© 2026 MarlinW Media</text>
        </svg>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>© 2026 MarlinW Media</span>
      <span>Preisliste</span>
      <a href="impressum.html" class="footer-link">Impressum</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
