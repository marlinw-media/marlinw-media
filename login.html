<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Login – MarlinW Media</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background" aria-hidden="true">
    <div class="grid"></div>
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>
    <div class="shape four"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <button class="menu-toggle hidden-mobile" type="button" style="visibility:hidden;">Menü</button>

      <a href="index.html#home" class="brand" aria-label="Zur Startseite">
        <img src="logo-white.png" alt="MarlinW Media Logo" class="brand-logo" id="brandLogo" />
      </a>

      <nav class="desktop-nav" aria-label="Hauptnavigation">
        <a href="index.html#portfolio">Portfolio</a>
        <a href="shop.html">Bilder kaufen</a>
        <a href="index.html#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Login</h1>
      <p>
        Melde dich mit deiner E-Mail oder mit dem Teil vor dem @ an.
      </p>

      <form class="auth-form" onsubmit="loginUser(event)">
        <div class="form-row">
          <label for="loginIdentifier">E-Mail / Benutzername</label>
          <input type="text" id="loginIdentifier" required />
        </div>

        <div class="form-row">
          <label for="loginPassword">Passwort</label>
          <input type="password" id="loginPassword" required />
        </div>

        <button class="button primary" type="submit">Login</button>
      </form>

      <div class="auth-links">
        Noch kein Benutzerkonto?
        <a href="register.html">Jetzt registrieren</a>
      </div>

      <div class="form-message" id="loginMessage"></div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>© 2026 MarlinW Media</span>
      <span>Foto • Video • Content • Creative Production</span>
      <a href="impressum.html" class="footer-link">Impressum</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
