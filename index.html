<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>MarlinW Media</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --white: #ffffff;
      --text-soft: #cfcfcf;
      --line: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.05);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    html, body {
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.10), transparent 22%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.06), transparent 18%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.06), transparent 20%),
        linear-gradient(135deg, #000000 0%, #070707 35%, #101010 65%, #000000 100%);
    }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.2;
      animation: slowDrift 18s ease-in-out infinite alternate;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      z-index: 2;
    }

    .hero {
      width: min(100%, 820px);
      text-align: center;
      padding: 36px 26px 42px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .logo {
      display: block;
      width: min(260px, 52vw);
      margin: 0 auto 26px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      margin-bottom: 18px;
    }

    .subtitle {
      max-width: 680px;
      margin: 0 auto 30px;
      color: var(--text-soft);
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .notice {
      margin: 0 auto 22px;
      padding: 18px 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      font-size: 1.5rem;
    }

    .phone {
      font-size: 1.1rem;
      color: #d9d9d9;
    }

    /* 🔥 WICHTIG: verhindert Umbruch */
    .phone a {
      white-space: nowrap;
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }

    @keyframes slowDrift {
      0% { transform: translate(0,0); }
      100% { transform: translate(-10px,10px); }
    }
  </style>
</head>

<body>

  <div class="background">
    <div class="grid"></div>
  </div>

  <main class="wrap">
    <section class="hero">

      <img src="logo-white.png" alt="MarlinW Media Logo" class="logo" />

      <h1>MarlinW Media</h1>

      <p class="subtitle">
        Kreative Medienlösungen, visuelle Projekte und moderne Markenauftritte.
      </p>

      <div class="notice">
        Diese Website befindet sich aktuell im Aufbau.
      </div>

      <p class="phone">
        Sie können mich gerne unter
        <a href="tel:+4915231036109">+49 152 31036109</a>
        erreichen.
      </p>

    </section>
  </main>

</body>
</html>
