<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarlinW Media</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --bg-soft: #0d0d0d;
      --white: #ffffff;
      --gray-1: #f2f2f2;
      --gray-2: #cfcfcf;
      --gray-3: #9a9a9a;
      --gray-4: #5e5e5e;
      --gray-5: #222222;
      --line: rgba(255,255,255,0.12);
      --glass: rgba(255,255,255,0.06);
      --shadow: 0 20px 60px rgba(0,0,0,0.55);
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.12), transparent 22%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.08), transparent 18%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.08), transparent 20%),
        linear-gradient(135deg, #000000 0%, #080808 35%, #111111 65%, #000000 100%);
      color: var(--white);
      overflow: hidden;
      position: relative;
    }

    /* Hintergrund-Layer */
    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      opacity: 0.25;
      animation: slowDrift 18s ease-in-out infinite alternate;
    }

    .shape {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .shape.one {
      width: 320px;
      height: 320px;
      top: -60px;
      left: -80px;
      clip-path: polygon(0 0, 100% 18%, 78% 100%, 12% 82%);
      transform: rotate(-12deg);
      animation: floatOne 10s ease-in-out infinite;
    }

    .shape.two {
      width: 260px;
      height: 260px;
      right: 8%;
      top: 10%;
      clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%);
      animation: floatTwo 12s ease-in-out infinite;
    }

    .shape.three {
      width: 420px;
      height: 220px;
      bottom: -30px;
      left: 8%;
      clip-path: polygon(0 30%, 75% 0, 100% 60%, 20% 100%);
      animation: floatThree 14s ease-in-out infinite;
    }

    .shape.four {
      width: 180px;
      height: 180px;
      right: 18%;
      bottom: 12%;
      clip-path: polygon(20% 0, 100% 20%, 80% 100%, 0 80%);
      animation: pulseShape 8s ease-in-out infinite;
    }

    .glow-line {
      position: absolute;
      width: 2px;
      height: 45vh;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45), transparent);
      filter: blur(0.5px);
      opacity: 0.45;
    }

    .glow-line.one {
      left: 14%;
      top: 12%;
      transform: rotate(28deg);
      animation: lineMove 9s ease-in-out infinite;
    }

    .glow-line.two {
      right: 18%;
      bottom: 6%;
      transform: rotate(-32deg);
      animation: lineMove 11s ease-in-out infinite reverse;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0.02) 65%, transparent 75%);
      filter: blur(10px);
      opacity: 0.55;
      animation: pulseOrb 7s ease-in-out infinite;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      top: 14%;
      left: 62%;
    }

    .orb.two {
      width: 240px;
      height: 240px;
      bottom: 5%;
      right: 10%;
      animation-delay: 1.8s;
    }

    /* Content */
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .hero {
      width: min(100%, 980px);
      text-align: center;
      padding: 56px 32px;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      z-index: -1;
      animation: cardFloat 6s ease-in-out infinite;
    }

    .top-line {
      width: 110px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
      margin: 0 auto 28px;
      animation: fadeSlide 1.2s ease forwards;
      opacity: 0;
    }

    .logo {
      width: min(700px, 88vw);
      display: block;
      margin: 0 auto 22px;
      opacity: 0;
      transform: translateY(-20px) scale(0.96);
      animation: logoReveal 1.2s ease forwards;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.35s;
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      color: #cfcfcf;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      line-height: 1.7;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.55s;
    }

    .notice {
      margin: 30px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #efefef;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1s ease forwards, softPulse 3s ease-in-out infinite;
      animation-delay: 0.8s, 1.8s;
    }

    .notice-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px rgba(255,255,255,0.85);
      animation: dotBlink 2s ease-in-out infinite;
    }

    .corner-accent {
      position: absolute;
      width: 120px;
      height: 120px;
      border-top: 1px solid rgba(255,255,255,0.18);
      border-left: 1px solid rgba(255,255,255,0.18);
      top: 18px;
      left: 18px;
      opacity: 0.6;
    }

    .corner-accent.right {
      right: 18px;
      left: auto;
      top: auto;
      bottom: 18px;
      border-top: none;
      border-left: none;
      border-right: 1px solid rgba(255,255,255,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    /* Animationen */
    @keyframes logoReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateX(-18px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes softPulse {
      0%, 100% {
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      50% {
        box-shadow: 0 10px 36px rgba(255,255,255,0.08);
      }
    }

    @keyframes dotBlink {
      0%, 100% {
        opacity: 0.5;
        transform: scale(0.9);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @keyframes floatOne {
      0%, 100% {
        transform: translateY(0) rotate(-12deg);
      }
      50% {
        transform: translateY(18px) rotate(-8deg);
      }
    }

    @keyframes floatTwo {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-18px) rotate(6deg);
      }
    }

    @keyframes floatThree {
      0%, 100% {
        transform: translateX(0) rotate(0deg);
      }
      50% {
        transform: translateX(12px) rotate(-4deg);
      }
    }

    @keyframes pulseShape {
      0%, 100% {
        transform: scale(1) rotate(0deg);
      }
      50% {
        transform: scale(1.05) rotate(4deg);
      }
    }

    @keyframes pulseOrb {
      0%, 100% {
        transform: scale(1);
        opacity: 0.35;
      }
      50% {
        transform: scale(1.12);
        opacity: 0.65;
      }
    }

    @keyframes lineMove {
      0%, 100% {
        opacity: 0.22;
        transform: translateY(0) rotate(28deg);
      }
      50% {
        opacity: 0.55;
        transform: translateY(10px) rotate(28deg);
      }
    }

    @keyframes cardFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes slowDrift {
      0% {
        transform: scale(1) translate(0, 0);
      }
      100% {
        transform: scale(1.04) translate(-10px, 10px);
      }
    }

    @media (max-width: 768px) {
      .hero {
        padding: 42px 20px;
      }

      .shape.one,
      .shape.two,
      .shape.four {
        opacity: 0.6;
      }

      .shape.three {
        width: 280px;
        height: 160px;
      }

      .corner-accent,
      .corner-accent.right {
        width: 70px;
        height: 70px;
      }

      .notice {
        border-radius: 18px;
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="grid"></div>
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>
    <div class="shape four"></div>
    <div class="glow-line one"></div>
    <div class="glow-line two"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <main class="wrap">
    <section class="hero">
      <div class="corner-accent"></div>
      <div class="corner-accent right"></div>

      <div class="top-line"></div>

      <img src="logo-white.png" alt="MarlinW Media Logo" class="logo" />

      <h1>MarlinW Media</h1>

      <p class="subtitle">
        Kreative Medienlösungen, visuelle Projekte und moderne Markenauftritte.
      </p>

      <div class="notice">
        <span class="notice-dot"></span>
        <span>Diese Website befindet sich aktuell im Aufbau.</span>
      </div>
    </section>
  </main>
</body>
</html>
