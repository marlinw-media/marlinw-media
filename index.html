<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarlinW Media</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 220px;
      max-width: 80%;
      margin-bottom: 30px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeIn 1s ease forwards;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      letter-spacing: 1px;
      animation: fadeIn 1.2s ease forwards;
    }

    p {
      font-size: 1.1rem;
      color: #aaa;
      animation: fadeIn 1.4s ease forwards;
    }

    .notice {
      margin-top: 25px;
      font-size: 1rem;
      color: #ccc;
      border: 1px solid #333;
      padding: 12px 20px;
      display: inline-block;
      border-radius: 8px;
      animation: fadeIn 1.6s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- LOGO -->
    <img src="logo-white.png" alt="MarlinW Media Logo" class="logo">

    <!-- EINZIGE ÜBERSCHRIFT -->
    <h1>MarlinW Media</h1>

    <!-- TEXT -->
    <p>Kreative Medienlösungen & moderne Projekte</p>

    <!-- HINWEIS -->
    <div class="notice">
      Diese Website befindet sich aktuell im Aufbau.
    </div>
  </div>

</body>
</html>
