<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarlinW Media</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">
  <div class="grid"></div>
  <div class="shape one"></div>
  <div class="shape two"></div>
  <div class="shape three"></div>
  <div class="shape four"></div>
  <div class="orb one"></div>
  <div class="orb two"></div>
</div>

<header class="site-header">
  <div class="header-inner">

    <button id="menuToggle" class="menu-toggle">Menü</button>

    <a href="#" class="brand">
      <img src="logo-white.png" id="logo" class="brand-logo">
    </a>

    <nav class="desktop-nav">
      <a href="#portfolio">Portfolio</a>
      <a href="#partner">Partner</a>
      <a href="#kontakt">Kontakt</a>
    </nav>

  </div>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#portfolio">Portfolio</a>
    <a href="#partner">Partner</a>
    <a href="#kontakt">Kontakt</a>
  </div>
</header>

<main>

<section class="hero">
  <div>
    <h1>MarlinW Media</h1>
    <p>Moderne Medienproduktion für starke Marken und visuelle Erlebnisse.</p>

    <div class="hero-actions">
      <a href="#portfolio" class="button primary">Portfolio</a>
      <a href="#kontakt" class="button">Kontakt</a>
    </div>
  </div>
</section>

<!-- PORTFOLIO SLIDER -->
<section id="portfolio">
  <h2>Portfolio</h2>

  <div class="slider">
    <div class="slider-track" id="sliderTrack">

      <!-- Slides -->
      <div class="slide"></div>
      <div class="slide"></div>
      <div class="slide"></div>
      <div class="slide"></div>
      <div class="slide"></div>

    </div>
  </div>
</section>

<section id="partner">
  <h2>Partner</h2>
  <div class="grid-3">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
</section>

<section id="kontakt">
  <h2>Kontakt</h2>

  <div class="contact-box">
    <p>📞 +49 152 31036109</p>
    <p>📧 marlinw.media@gmail.com</p>
    <p>📸 @marlinw_media</p>
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
