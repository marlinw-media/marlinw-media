<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>MarlinW Media</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --white: #ffffff;
      --text-soft: #cfcfcf;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    html,
    body {
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.10), transparent 22%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,0.06), transparent 18%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.06), transparent 20%),
        linear-gradient(135deg, #000000 0%, #070707 35%, #101010 65%, #000000 100%);
    }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      -webkit-mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      opacity: 0.22;
      animation: slowDrift 18s ease-in-out infinite alternate;
    }

    .shape {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
    }

    .shape.one {
      width: 320px;
      height: 320px;
      top: -60px;
      left: -80px;
      clip-path: polygon(0 0, 100% 18%, 78% 100%, 12% 82%);
      transform: rotate(-12deg);
      animation: floatOne 10s ease-in-out infinite;
    }

    .shape.two {
      width: 260px;
      height: 260px;
      right: 8%;
      top: 10%;
      clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%);
      animation: floatTwo 12s ease-in-out infinite;
    }

    .shape.three {
      width: 420px;
      height: 220px;
      bottom: -30px;
      left: 8%;
      clip-path: polygon(0 30%, 75% 0, 100% 60%, 20% 100%);
      animation: floatThree 14s ease-in-out infinite;
    }

    .shape.four {
      width: 180px;
      height: 180px;
      right: 18%;
      bottom: 12%;
      clip-path: polygon(20% 0, 100% 20%, 80% 100%, 0 80%);
      animation: pulseShape 8s ease-in-out infinite;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.20), rgba(255,255,255,0.02) 65%, transparent 75%);
      filter: blur(12px);
      opacity: 0.45;
      animation: pulseOrb 7s ease-in-out infinite;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      top: 14%;
      left: 62%;
    }

    .orb.two {
      width: 240px;
      height: 240px;
      bottom: 5%;
      right: 10%;
      animation-delay: 1.8s;
    }

    .wrap {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      z-index: 2;
    }

    .hero {
      width: min(100%, 820px);
      text-align: center;
      padding: 36px 26px 42px;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .corner-accent {
      position: absolute;
      width: 90px;
      height: 90px;
      border-top: 1px solid rgba(255,255,255,0.14);
      border-left: 1px solid rgba(255,255,255,0.14);
      top: 18px;
      left: 18px;
      opacity: 0.6;
    }

    .corner-accent.right {
      right: 18px;
      left: auto;
      top: auto;
      bottom: 18px;
      border-top: none;
      border-left: none;
      border-right: 1px solid rgba(255,255,255,0.14);
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    .top-line {
      width: 110px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.65), transparent);
      margin: 0 auto 24px;
      opacity: 0.9;
    }

    .logo {
      display: block;
      width: min(260px, 52vw);
      margin: 0 auto 26px;
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.08));
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }

    .subtitle {
      max-width: 680px;
      margin: 0 auto 30px;
      color: var(--text-soft);
      font-size: clamp(1rem, 2vw, 1.22rem);
      line-height: 1.7;
    }

    .notice {
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #f2f2f2;
      max-width: 680px;
      font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      line-height: 1.4;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .notice-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .phone {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: #d9d9d9;
      line-height: 1.7;
    }

    .phone a {
      white-space: nowrap;
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 2px;
    }

    .phone a:hover {
      border-bottom-color: rgba(255,255,255,0.7);
    }

    @keyframes floatOne {
      0%, 100% { transform: translateY(0) rotate(-12deg); }
      50% { transform: translateY(18px) rotate(-8deg); }
    }

    @keyframes floatTwo {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(6deg); }
    }

    @keyframes floatThree {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      50% { transform: translateX(12px) rotate(-4deg); }
    }

    @keyframes pulseShape {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.05) rotate(4deg); }
    }

    @keyframes pulseOrb {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.12); opacity: 0.55; }
    }

    @keyframes slowDrift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.04) translate(-10px, 10px); }
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 24px 14px;
      }

      .hero {
        padding: 28px 18px 34px;
        border-radius: 24px;
      }

      .logo {
        width: min(180px, 48vw);
        margin-bottom: 22px;
      }

      .subtitle {
        margin-bottom: 24px;
      }

      .notice {
        font-size: 1.35rem;
        padding: 18px 16px;
        border-radius: 20px;
      }

      .corner-accent,
      .corner-accent.right {
        width: 62px;
        height: 62px;
      }

      .shape.one,
      .shape.two,
      .shape.four {
        opacity: 0.55;
      }

      .shape.three {
        width: 280px;
        height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="grid"></div>
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>
    <div class="shape four"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <main class="wrap">
    <section class="hero">
      <div class="corner-accent"></div>
      <div class="corner-accent right"></div>

      <div class="top-line"></div>

      <img src="logo-white.png" alt="MarlinW Media Logo" class="logo" />

      <h1>MarlinW Media</h1>

      <p class="subtitle">
        Kreative Medienlösungen, visuelle Projekte und moderne Markenauftritte.
      </p>

      <div class="notice">
        <span class="notice-dot"></span>
        <span>Diese Website befindet sich aktuell im Aufbau.</span>
      </div>

      <p class="phone">
        Sie können mich gerne unter
        <a href="tel:+4915231036109">+49 152 31036109</a>
        erreichen.
      </p>
    </section>
  </main>
</body>
</html>
