<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Passwort ändern – MarlinW Media</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background" aria-hidden="true">
    <div class="grid"></div>
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>
    <div class="shape four"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <button class="menu-toggle hidden-mobile" type="button" style="visibility:hidden;">Menü</button>

      <a href="index.html#home" class="brand" aria-label="Zur Startseite">
        <img src="logo-white.png" alt="MarlinW Media Logo" class="brand-logo" id="brandLogo" />
        <span class="brand-name">MarlinW Media</span>
      </a>

      <nav class="desktop-nav" aria-label="Hauptnavigation">
        <a href="profile.html">Profil</a>
        <a href="orders.html">Bestellungen</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Passwort ändern</h1>
      <p>Ändere dein Passwort sicher und direkt im gespeicherten Konto.</p>

      <form class="auth-form" onsubmit="saveNewPassword(event)">
        <div class="form-row">
          <label for="passwordEmail">E-Mail</label>
          <input type="email" id="passwordEmail" disabled />
        </div>

        <div class="form-row">
          <label for="currentPassword">Aktuelles Passwort</label>
          <input type="password" id="currentPassword" required />
          <div class="field-hint error" id="currentPasswordHint">Hinweis: Das aktuelle Passwort stimmt nicht überein</div>
        </div>

        <div class="form-row">
          <label for="newPassword">Neues Passwort</label>
          <input type="password" id="newPassword" required />
          <div class="field-hint error" id="newPasswordLengthHint">Hinweis: Das Passwort muss 8-14 Zeichen lang sein</div>
        </div>

        <div class="form-row">
          <label for="confirmPassword">Passwort bestätigen</label>
          <input type="password" id="confirmPassword" required />
          <div class="field-hint error" id="newPasswordMatchHint">Hinweis: Die neuen Passwörter müssen übereinstimmen</div>
        </div>

        <button class="button primary" id="savePasswordButton" type="submit">Speichern</button>
      </form>

      <div class="form-message" id="passwordMessage"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
